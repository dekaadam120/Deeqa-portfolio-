<!DOCTYPE html>
<html>
<head>
<title>7 Days Todo List</title>
<style>
body{
    font-family: Arial;
    background: #e3f2fd;
    text-align: center;
}

h1{
    color: #0056b3;
}

table{
    width: 80%;
    margin: auto;
    border-collapse: collapse;
    background: white;
}

th, td{
    border: 2px solid #0056b3;
    padding: 15px;
}

th{
    background: #007bff;
    color: white;
}

input{
    width: 20px;
    height: 20px;
}
</style>
</head>

<body>

<h1>My 7 Days Todo List</h1>

<table>
<tr>
<th>Day</th>
<th>Task</th>
<th>Done</th>
</tr>

<tr>
<td>Saturday</td>
<td>Study</td>
<td><input type="checkbox"></td>
</tr>

<tr>
<td>Sunday</td>
<td>Exercise</td>
<td><input type="checkbox"></td>
</tr>

<tr>
<td>Monday</td>
<td>Read a Book</td>
<td><input type="checkbox"></td>
</tr>

<tr>
<td>Tuesday</td>
<td>Practice Coding</td>
<td><input type="checkbox"></td>
</tr>

<tr>
<td>Wednesday</td>
<td>Homework</td>
<td><input type="checkbox"></td>
</tr>

<tr>
<td>Thursday</td>
<td>Revision</td>
<td><input type="checkbox"></td>
</tr>

<tr>
<td>Friday</td>
<td>Rest & Plan</td>
<td><input type="checkbox"></td>
</tr>

</table>

</body>
</html>
