<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Calculator Pro</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1e90ff,#6a5acd);
  font-family:Arial;
}

.calculator{
  width:90%;
  max-width:320px;
  background:#111;
  padding:20px;
  border-radius:20px;
}

#display{
  width:100%;
  height:70px;
  font-size:30px;
  text-align:right;
  border:none;
  border-radius:12px;
  margin-bottom:15px;
  background:#222;
  color:#0f0;
  padding:10px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

button{
  height:60px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:#333;
  color:white;
}

button:active{
  transform:scale(0.95);
}

.equal{background:#00c853;}
.clear{background:#d50000;}
.op{background:#2979ff;}
</style>
</head>

<body>

<div class="calculator">
  <input id="display" disabled>

  <div class="buttons">
    <button class="clear" onclick="clr()">C</button>
    <button class="op" onclick="add('/')">/</button>
    <button class="op" onclick="add('*')">*</button>
    <button class="op" onclick="add('-')">-</button>

    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button class="op" onclick="add('+')">+</button>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button class="equal" onclick="calc()">=</button>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button onclick="add('0')">0</button>
  </div>
</div>

<script>
function add(v){
  document.getElementById("display").value += v;
}

function clr(){
  document.getElementById("display").value = "";
}

function calc(){
  try{
    document.getElementById("display").value =
    eval(document.getElementById("display").value);
  }catch{
    alert("Error");
  }
}
</script>

</body>
</html>
